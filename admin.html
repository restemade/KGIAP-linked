<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>KGI Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{background:#050b1a;color:#fff;font-family:sans-serif;padding:20px}
    .box{max-width:600px;margin:0 auto;background:#0a2a66;padding:25px;border-radius:15px}
    input{display:block;width:100%;padding:10px;margin:10px 0;border-radius:5px;border:none}
    button{width:100%;padding:12px;background:gold;border:none;border-radius:5px;font-weight:bold;cursor:pointer}
    .item{border-bottom:1px solid rgba(255,255,255,.1);padding:15px 0}
    .hidden{display:none}
  </style>
</head>
<body>
<div class="box">
  <div id="login">
    <h2>Админ панель</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Пароль">
    <button onclick="signIn()">Войти</button>
  </div>
  <div id="panel" class="hidden">
    <h2>Управление ссылками</h2>
    <div id="list"></div>
    <button onclick="add()" style="background:#28a745;color:#fff;margin-top:20px">+ Добавить ссылку</button>
  </div>
</div>
<script>
  const supabase = supabase.createClient('https://cyfbjuloedprccdvyftw.supabase.co', 'sb_publishable_LjTrJ1dkG9Emd7_EBHjc7w_XkntS7vM');
  
  async function signIn() {
    const { error } = await supabase.auth.signInWithPassword({
      email: document.getElementById('email').value,
      password: document.getElementById('pass').value
    });
    if (error) alert(error.message); else check();
  }

  async function check() {
    const { data: { user } } = await supabase.auth.getUser();
    if (user) {
      document.getElementById('login').classList.add('hidden');
      document.getElementById('panel').classList.remove('hidden');
      load();
    }
  }

  async function load() {
    const { data } = await supabase.from('links').select('*').order('sort_order');
    document.getElementById('list').innerHTML = data.map(l => `
      <div class="item">
        <input value="${l.title_ru}" onchange="upd('${l.id}','title_ru',this.value)" placeholder="Заголовок RU">
        <input value="${l.url}" onchange="upd('${l.id}','url',this.value)" placeholder="URL">
        <button onclick="del('${l.id}')" style="background:red;width:auto;padding:5px 10px">Удалить</button>
      </div>
    `).join('');
  }

  async function upd(id, field, val) { await supabase.from('links').update({[field]: val}).eq('id', id); }
  async function add() { await supabase.from('links').insert([{title_ru:'Новая', url:'#'}]); load(); }
  async function del(id) { if(confirm('Удалить?')) { await supabase.from('links').delete().eq('id', id); load(); } }
  check();
</script>
</body>
</html>
